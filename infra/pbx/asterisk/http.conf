; =============================================================================
; Opiflow — Asterisk http.conf (WebRTC WSS listener for the in-browser softphone)
; =============================================================================
; The web softphone (jsSIP) connects over Secure WebSocket (WSS). Asterisk serves
; that listener from its built-in HTTP server with TLS enabled. The pjsip
; [transport-wss] transport rides on top of this.
;
; Deploy path on the box: /etc/asterisk/http.conf
;
; ⚠️ REFERENCE TEMPLATE — this is the STANDARD Asterisk WebRTC HTTP/WSS shape, not
; a verbatim copy of the live box. Run infra/pbx/capture-base-config.sh to replace
; it with the exact running config. The TLS cert/key paths must match
; OPIFLOW_TLS_CERT / OPIFLOW_TLS_KEY used by scripts/provision-asterisk.py
; (defaults: /etc/asterisk/tls/asterisk.pem and .key).
; =============================================================================

[general]
enabled=yes
bindaddr=0.0.0.0
; Plain HTTP is not used for media; keep it minimal.
bindport=8088

; TLS / WSS — this is what jsSIP connects to (wss://<host>:8089/ws).
tlsenable=yes
tlsbindaddr=0.0.0.0:8089
tlscertfile=/etc/asterisk/tls/asterisk.pem
tlsprivatekey=/etc/asterisk/tls/asterisk.key

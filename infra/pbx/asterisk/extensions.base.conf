; =============================================================================
; Opiflow — Asterisk dialplan BASE config (hand-applied parts, now in git)
; =============================================================================
; Source of truth for from-intertelecom / from-twilio: docs/PBX_SETUP_FOR_INTERTELECOM.md
; §4–§5 + docs/CALL_RECORDING_DISCLOSURE.md. The per-business routing tables
; (opiflow-inbound DID→endpoint, opiflow-outbound DID→disclosure clip) are GENERATED
; by scripts/provision-asterisk.py into extensions_opiflow.conf — see the #include.
;
; Deploy path on the box: /etc/asterisk/extensions.conf
;
; ⚠️ VERIFY-ON-CAPTURE: run infra/pbx/capture-base-config.sh to overwrite this with
; the exact running dialplan. The disclosure-clip Playback/Dial-A() wiring matches
; CALL_RECORDING_DISCLOSURE.md; confirm against the live box.
; =============================================================================

; --- Inbound from the carrier ------------------------------------------------
; Every inbound call from the trunk lands here. We route SOLELY by the called DID
; (no caller / Diversion checks). opiflow-inbound (generated) maps DID → OPIFLOW_EP
; and stamps OPIFLOW_DISCLOSURE, then jumps back to `s` for the shared flow.
[from-intertelecom]
exten => _.,1,NoOp(Inbound DID=${EXTEN} from ${CALLERID(num)})
 same => n,Set(OPIFLOW_DID=${EXTEN})
 same => n,GotoIf($["${DIALPLAN_EXISTS(opiflow-inbound,${EXTEN},1)}"="1"]?opiflow-inbound,${EXTEN},1)
 same => n,Goto(s,1)

; Shared flow: answer → legal recording disclosure → record → ring the app (Twilio)
; + the legacy web/groundwire endpoints. OPIFLOW_DISCLOSURE is an ABSOLUTE, extension-
; less sound path (set by opiflow-inbound; global default otherwise) — Asterisk plays
; bare names from its own sounds dir, so the per-business clips MUST be absolute.
exten => s,1,Answer()
 same => n,Wait(1)
 same => n,Playback(${OPIFLOW_DISCLOSURE})
 same => n,MixMonitor(${UNIQUEID}.wav)
 same => n,Dial(PJSIP/${OPIFLOW_EP}@twilio-inbound & PJSIP/yorgospro001 & PJSIP/groundwire001,30)
 same => n,Hangup()

; --- Outbound from the native app (Twilio → carrier) -------------------------
; Twilio enters here off the trunk. Resolve the per-business disclosure clip via
; the generated [opiflow-outbound] Gosub (keyed by the caller-ID = business DID),
; then Dial the carrier with A(${OPIFLOW_DISCLOSURE}) so the customer hears it too.
[from-twilio]
exten => _+30XXXXXXXXXX,1,NoOp(Outbound to ${EXTEN} CLI=${CALLERID(num)})
 same => n,Gosub(opiflow-outbound,${CALLERID(num)},1)
 same => n,Dial(PJSIP/${EXTEN}@intertelecom,60,rA(${OPIFLOW_DISCLOSURE}))
 same => n,Hangup()
; (+ parallels for 30XXXXXXXXXX and [26]XXXXXXXXX — keep whatever the live box has)

; --- Outbound from the web softphone (jsSIP/WebRTC → carrier) ----------------
; ⚠️ NOT in the doc verbatim — reconstructed from provision-asterisk.py comments
; (from-webrtc stamps OPIFLOW_DID and Gosubs opiflow-outbound). VERIFY via capture.
[from-webrtc]
exten => _+30XXXXXXXXXX,1,NoOp(WebRTC outbound to ${EXTEN} DID=${OPIFLOW_DID})
 same => n,Gosub(opiflow-outbound,${OPIFLOW_DID},1)
 same => n,Set(CALLERID(num)=${OPIFLOW_DID})
 same => n,Dial(PJSIP/${EXTEN}@intertelecom,60,rA(${OPIFLOW_DISCLOSURE}))
 same => n,Hangup()

; --- Generated per-business routing (provision-asterisk.py) -------------------
; [opiflow-inbound]  DID → OPIFLOW_EP (+ OPIFLOW_DISCLOSURE)
; [opiflow-outbound] business-DID → OPIFLOW_DISCLOSURE (Gosub target; _X. catch-all → default)
#include extensions_opiflow.conf

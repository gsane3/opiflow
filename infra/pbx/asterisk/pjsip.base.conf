; =============================================================================
; Opiflow — Asterisk PJSIP BASE config (hand-applied parts, now in git)
; =============================================================================
; Source of truth for the TRUNK section: docs/PBX_SETUP_FOR_INTERTELECOM.md §3
; (copied verbatim; the InterTelecom trunk is "Registered, confirmed working").
;
; This file holds ONLY the stable, hand-applied base. The per-business WebRTC
; endpoints are generated at runtime by scripts/provision-asterisk.py into
; pjsip_opiflow_users.conf (see the #include at the bottom) — never edit those by
; hand. Deploy path on the box: /etc/asterisk/pjsip.conf
;
; SECRETS: the trunk password is NEVER committed. It lives in Ansible Vault /
; /etc/opiflow/sip.env and is templated in at deploy time. Keep the placeholder.
;
; ⚠️ VERIFY-ON-CAPTURE: the trunk block below is verbatim from the doc and is
; authoritative. The [transport-wss] / WebRTC bits are the STANDARD Asterisk
; WebRTC shape (the box uses jsSIP over WSS) — confirm they match the live box by
; running infra/pbx/capture-base-config.sh, which overwrites this file with the
; exact running config (redacting the password).
; =============================================================================

; --- SIP transport to the PSTN carrier (UDP) --------------------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=46.224.138.115
external_media_address=46.224.138.115
local_net=10.0.0.0/8

; --- WebRTC transport for the in-browser softphone (jsSIP over WSS) ----------
; The WSS listener itself is configured in http.conf (tlsenable + tlsbindaddr).
; The per-business [biz_<hex>] endpoints (generated) reference transport=transport-wss.
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089

; --- InterTelecom trunk IT658318 (verbatim, docs §3) ------------------------
[intertelecom-reg]
type=registration
transport=transport-udp
server_uri=sip:sip.intertelecom.gr
client_uri=sip:IT658318@sip.intertelecom.gr
contact_user=IT658318
outbound_auth=intertelecom-auth
expiration=120
retry_interval=30
forbidden_retry_interval=60

[intertelecom-auth]
type=auth
auth_type=userpass
username=IT658318
password=${INTERTELECOM_TRUNK_PASSWORD}   ; from Vault / /etc/opiflow/sip.env — never commit

[intertelecom-aor]
type=aor
contact=sip:IT658318@sip.intertelecom.gr
qualify_frequency=60

[intertelecom]
type=endpoint
transport=transport-udp
context=from-intertelecom
disallow=all
allow=alaw
allow=ulaw
aors=intertelecom-aor
outbound_auth=intertelecom-auth
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
from_domain=sip.intertelecom.gr
from_user=IT658318
send_pai=yes
send_rpid=yes
trust_id_outbound=yes

[intertelecom-identify]
type=identify
endpoint=intertelecom
match=146.120.226.3

; --- Twilio US1 SIP Domain (inbound leg → native app via Twilio Voice) -------
; docs §4. The inbound dialplan Dial()s PJSIP/${OPIFLOW_EP}@twilio-inbound.
[twilio-inbound-aor]
type=aor
contact=sip:opiflow.sip.us1.twilio.com:5060

[twilio-inbound]
type=endpoint
context=from-twilio
aors=twilio-inbound-aor
allow=ulaw,alaw
direct_media=no

; --- Generated per-business WebRTC endpoints (provision-asterisk.py) ----------
; One [biz_<hex>] endpoint/auth/aor per Opiflow business. Regenerated every minute
; from Supabase; reloaded only when changed. DO NOT edit the included file by hand.
#include pjsip_opiflow_users.conf

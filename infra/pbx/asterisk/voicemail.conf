; =============================================================================
; Opiflow — Asterisk voicemail.conf (REFERENCE / mostly unused)
; =============================================================================
; Opiflow does NOT rely on Asterisk's built-in VoiceMail() mailboxes for the
; product voicemail feature. Missed/voicemail audio is captured by MixMonitor in
; the dialplan and POSTed to /api/webhooks/voice/pbx-voicemail, which runs the same
; Deepgram→OpenAI transcription pipeline as recordings. So this file is typically
; minimal on the box.
;
; Kept here for completeness (a fresh Asterisk install ships a large default
; voicemail.conf). If the live box has a customised one, capture-base-config.sh
; pulls the real version into infra/pbx/asterisk/captured/voicemail.conf — trust
; that over this stub.
;
; Deploy path on the box: /etc/asterisk/voicemail.conf
; =============================================================================

[general]
format=wav
maxmsg=100
maxsecs=120
; No per-user mailboxes are provisioned — the dialplan records via MixMonitor and
; hands the audio to the backend webhook instead.
